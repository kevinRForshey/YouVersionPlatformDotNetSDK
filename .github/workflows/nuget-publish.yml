name: Publish NuGet Packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # nuget.config points a local package source ("YouVersionLocal") at ./packages. NuGet
      # requires local source directories to exist at restore time -- even for projects that
      # don't consume anything from them -- or restore fails with NU1301, so create it before
      # any restore runs (same reason ci.yml does this).
      - name: Create local NuGet feed directory
        run: mkdir -p packages

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      # Pack in strict dependency order so inter-package refs resolve correctly
      - name: Pack Platform.API.Models
        run: dotnet pack Platform.API.Models -c Release --no-build -o ./nupkgs

      - name: Pack YouVersion.UsfmReferences
        run: dotnet pack YouVersion.UsfmReferences -c Release --no-build -o ./nupkgs

      - name: Pack Platform.API
        run: dotnet pack Platform.API -c Release --no-build -o ./nupkgs

      - name: Pack Platform.SDK.Services
        run: dotnet pack Platform.SDK.Services -c Release --no-build -o ./nupkgs

      - name: Pack Platform.SDK.Components
        run: dotnet pack Platform.SDK.Components -c Release --no-build -o ./nupkgs

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate