name: CI

on:
  push:
    branches: [Development, main]
  pull_request:
    branches: [Development, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore YouVersionPlatform.slnx

      - name: Build
        run: dotnet build YouVersionPlatform.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Platform.API.Tests -c Release --no-build --verbosity normal
