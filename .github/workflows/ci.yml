name: CI

on:
  push:
    branches: [Development, main]
  pull_request:
    branches: [Development, main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    # Windows runners default to pwsh, but the steps below use bash-isms (mkdir -p, cat >> ...).
    # GitHub-hosted Windows runners ship Git Bash, so forcing bash here keeps one script for both OSes.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # nuget.config points a local package source ("YouVersionLocal") at ./packages, which
      # PlatformTestApp restores YouVersion.Platform.SDK.Components from. NuGet requires local
      # source directories to exist at restore time -- even for projects that don't consume
      # anything from them -- or restore fails with NU1301, so create it before any restore runs.
      - name: Create local NuGet feed directory
        run: mkdir -p packages

      # PlatformTestApp consumes YouVersion.Platform.SDK.Components as a packed NuGet
      # package (via the "YouVersionLocal" feed in nuget.config), not a ProjectReference,
      # so it exercises the real consumer experience. Build and pack the libraries in
      # dependency order first so that feed is populated before anything restores against it.
      - name: Build libraries
        run: |
          dotnet build Platform.API.Models -c Release
          dotnet build YouVersion.UsfmReferences -c Release
          dotnet build Platform.API -c Release
          dotnet build Platform.SDK.Services -c Release
          dotnet build Platform.SDK.Components -c Release
          dotnet build Platform.API.Benchmarks -c Release
          dotnet build PlatformConsoleSample -c Release

      - name: Test
        run: |
          dotnet test Platform.API.Tests -c Release --verbosity normal --collect:"XPlat Code Coverage"
          dotnet test YouVersion.UsfmReferences.Tests -c Release --verbosity normal --collect:"XPlat Code Coverage"
          dotnet test Platform.SDK.Services.Tests -c Release --verbosity normal --collect:"XPlat Code Coverage"
          dotnet test Platform.SDK.Components.Tests -c Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Scan for vulnerable NuGet packages
        run: dotnet list YouVersionPlatform.slnx package --vulnerable --include-transitive

      - name: Pack libraries to local feed
        run: |
          mkdir -p packages
          dotnet pack Platform.API.Models -c Release --no-build -o packages
          dotnet pack YouVersion.UsfmReferences -c Release --no-build -o packages
          dotnet pack Platform.API -c Release --no-build -o packages
          dotnet pack Platform.SDK.Services -c Release --no-build -o packages
          dotnet pack Platform.SDK.Components -c Release --no-build -o packages

      - name: Build PlatformTestApp
        run: dotnet build PlatformTestApp -c Release

      - name: Test PlatformTestApp
        run: dotnet test PlatformTestApp.Tests -c Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-${{ matrix.os }}
          path: '**/TestResults/**/coverage.cobertura.xml'
          if-no-files-found: warn

      - name: Summarize coverage
        uses: danielpalme/ReportGenerator-GitHub-Action@5.3.8
        with:
          reports: '**/TestResults/**/coverage.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'MarkdownSummaryGithub'

      - name: Publish coverage summary
        run: cat coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
